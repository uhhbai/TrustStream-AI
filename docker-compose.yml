version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truststream
    ports:
      - "5432:5432"
    volumes:
      - truststream_pg:/var/lib/postgresql/data

volumes:
  truststream_pg:
